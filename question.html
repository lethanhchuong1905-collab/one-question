<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>❤️ One Question</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
background:linear-gradient(180deg,#09091a,#000);
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

body::before{
content:"";
position:fixed;
inset:0;
background-image:
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 1px, transparent 1px);
background-size:90px 90px,140px 140px;
background-position:0 0,45px 45px;
opacity:.35;
animation:moveStars 40s linear infinite;
}

@keyframes moveStars{
from{transform:translateY(0);}
to{transform:translateY(100px);}
}

.box{
position:relative;
z-index:2;
text-align:center;
padding:30px;
}

h1{
font-size:42px;
margin-bottom:40px;
font-weight:300;
}

button{
padding:16px 36px;
font-size:22px;
border:none;
border-radius:40px;
cursor:pointer;
margin:15px;
transition:.2s;
}

#yes{
background:#ff2d55;
color:white;
box-shadow:0 0 30px #ff2d55;
}

#no{
background:white;
color:black;
position:absolute;
}

#msg{
margin-top:40px;
font-size:28px;
color:#ffd966;
display:none;
}

.heart{
position:fixed;
font-size:26px;
animation:fly 4s linear forwards;
pointer-events:none;
}

@keyframes fly{
from{
transform:translateY(0);
opacity:1;
}
to{
transform:translateY(-120vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="box">

<h1>❤️<br>Em đồng ý làm người yêu anh nha?</h1>

<button id="yes">
Đồng ý ❤️
</button>

<button id="no">
Chưa 😝
</button>

<div id="msg">
💖 Cảm ơn em đã đồng ý! 💖
</div>

</div>

<script>

const no=document.getElementById("no");

function moveButton(){

let x=Math.random()*(window.innerWidth-150);

let y=Math.random()*(window.innerHeight-80);

no.style.left=x+"px";

no.style.top=y+"px";

}

no.addEventListener("mouseover",moveButton);

no.addEventListener("click",moveButton);

document.getElementById("yes").onclick=function(){

document.getElementById("msg").style.display="block";

for(let i=0;i<120;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.bottom="-30px";

h.style.animationDuration=(2+Math.random()*3)+"s";

document.body.appendChild(h);

setTimeout(()=>h.remove(),5000);

}

}

</script>

</body>
</html>
