<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Question ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#000;
color:#fff;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.container{
text-align:center;
padding:20px;
}

h1{
font-size:45px;
margin-bottom:20px;
animation:fade 2s;
}

p{
font-size:22px;
opacity:.9;
margin-bottom:40px;
animation:fade 3s;
}

button{
padding:18px 45px;
font-size:22px;
border:none;
border-radius:50px;
background:#ff2d55;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>

</head>

<body>

<div class="container">

<h1>❤️</h1>

<p>Anh có một điều muốn em xem...</p>

<button onclick="window.location.href='video.html'">
Bắt đầu
</button>

</div>

</body>

</html>
